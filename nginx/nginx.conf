events {}

http {
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen 80;
    server_name aidetect0r.store www.aidetect0r.store;

    return 301 https://$host$request_uri;
  }

  server{
    listen 443 ssl;
    server_name aidetect0r.store www.aidetect0r.store;

    ssl_certificate /etc/letsencrypt/live/aidetect0r.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidetect0r.store/privkey.pem;

    # 기본 SSL 권장 옵션
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location /media/havati_products/ {
      alias /app/media/havati_products/;
      autoindex off;
    }

    location /media/closet_images/ {
      alias /app/media/closet_images/;
      autoindex off;
    }

    location /ai/ {
      set $ai_upstream ai:8001;

      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_connect_timeout 600s;

      proxy_pass http://$ai_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      # Use a variable to force runtime DNS lookup of `app`.
      set $django_upstream app:8000;
      proxy_pass http://$django_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
